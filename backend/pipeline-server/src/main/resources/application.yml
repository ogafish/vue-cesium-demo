server:
  port: 48090

spring:
  datasource:
    url: ${PIPELINE_DB_URL:jdbc:mysql://localhost:3306/vue_cesium_pipeline_gis?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${PIPELINE_DB_USERNAME:root}
    password: ${PIPELINE_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

pipeline:
  frontend-root: ${PIPELINE_FRONTEND_ROOT:../../vue-cesium-vite}
  node-command: ${PIPELINE_NODE_COMMAND:node}
  generated-url-prefix: /pipeline-tiles/generated
  generation-concurrency: 2
