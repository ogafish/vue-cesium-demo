services:
  mysql:
    image: mysql:5.7
    container_name: pipeline-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: vue_cesium_pipeline_gis
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pipeline-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pipeline-backend
    restart: unless-stopped
    environment:
      PIPELINE_DB_URL: jdbc:mysql://mysql:3306/vue_cesium_pipeline_gis?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      PIPELINE_DB_USERNAME: root
      PIPELINE_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      PIPELINE_FRONTEND_ROOT: /app/frontend
      PIPELINE_NODE_COMMAND: node
    volumes:
      - pipeline-tiles-generated:/app/frontend/public/pipeline-tiles/generated
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "48090"

  pipeline-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_TIANDITU_TOKEN: ${VITE_TIANDITU_TOKEN}
        VITE_CESIUM_ION_TOKEN: ${VITE_CESIUM_ION_TOKEN}
    container_name: pipeline-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - pipeline-backend

volumes:
  mysql-data:
  pipeline-tiles-generated:
